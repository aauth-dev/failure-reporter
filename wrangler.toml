name = "failure-reporter"
main = "src/index.ts"
compatibility_date = "2025-04-01"

# Opt in to the account-level Workers Trace Events Logpush job (forensic
# archive: R2 bucket cloudflare-managed-3941311c, WEUR). Per-worker opt-in
# is required — without this the account job ignores the worker.
logpush = true

[observability]
enabled = true

[[queues.consumers]]
queue = "aauth-events-dlq"
max_batch_size = 100
max_batch_timeout = 60

[[queues.producers]]
queue = "aauth-events"
binding = "EVENTS_QUEUE"
